<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main>
      <div class="centered"><h1>Things To Do</h1></div>
      <section class="centered">
        <ul class="todo-list">
          <li>
            <input type="checkbox" name="checkbox" id="checkbox-1" />
            <label for="checkbox-1">Visit skywalkerSam.dev</label>
            <ul class="sub-item">
              <li>
                <a
                  class="sub-item-link"
                  href="https://skywalkerSam.dev"
                  target="_blank"
                  rel="noopener noreferrer"
                  >skywalkerSam.dev</a
                >
              </li>
            </ul>
          </li>
          <li>
            <input type="checkbox" name="checkbox" id="checkbox-2" />
            <label for="checkbox-2">Visit A Starboy's Blog</label>
            <ul class="sub-item">
              <li>
                <a
                  class="sub-item-link"
                  href="https://blog.skywalkerSam.dev"
                  target="_blank"
                  rel="noopener noreferrer"
                  >A Starboy's Blog</a
                >
              </li>
            </ul>
          </li>
          <li>
            <input type="checkbox" name="checkbox" id="checkbox-3" />
            <label for="checkbox-3">Visit the About Section</label>
            <ul class="sub-item">
              <li>
                <a
                  class="sub-item-link"
                  href="https://skywalkerSam.dev/about"
                  target="_blank"
                  rel="noopener noreferrer"
                  >About Section</a
                >
              </li>
            </ul>
          </li>
          <li>
            <input type="checkbox" name="checkbox" id="checkbox-4" />
            <label for="checkbox-4">Visit Starboy's Github</label>
            <ul class="sub-item">
              <li>
                <a
                  class="sub-item-link"
                  href="https://github.com/skywalkerSam"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Starboy's Github</a
                >
              </li>
            </ul>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
