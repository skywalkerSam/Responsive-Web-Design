<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="blog-post-card">
        <img
          src="https://images.unsplash.com/photo-1757938922866-ddcf1c611db2?q"
          alt="cover image"
          class="post-img"
        />
        <div class="post-content">
          <h2 class="post-title">The Quiet Beauty of The World</h2>
          <p class="post-excerpt">
            All you have to do is stop for a minute, look around, and notice.
          </p>
          <a class="read-more" href="https://blog.skywalkersam.dev/">Read More</a>
        </div>
      </div>
    </main>
  </body>
</html>
